<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CafeBoost</title>
    <meta name="description" content="CafeBoost helps cafes manage QR ordering, bookings, loyalty rewards, staff workflows, and customer relationships.">
    <meta name="author" content="CafeBoost" />
    
    <!-- PWA Configuration -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CafeBoost" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="CafeBoost">
    <meta property="og:description" content="QR ordering, loyalty, bookings, payments, and live cafe operations in one platform.">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CafeBoost">
    <meta name="twitter:description" content="QR ordering, loyalty, bookings, payments, and live cafe operations in one platform.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope:', registration.scope);
            })
            .catch((error) => {
              console.log('ServiceWorker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
